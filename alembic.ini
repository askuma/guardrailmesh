[alembic]
script_location = migrations
prepend_sys_path = .

# sqlalchemy.url is overridden at runtime from GUARDRAIL_DB_URL env var
# (see migrations/env.py). Set a placeholder here so alembic CLI works
# without env vars when running offline (alembic upgrade head --sql).
sqlalchemy.url = sqlite:///guardrail.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
