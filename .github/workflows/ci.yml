name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Verify no redteam imports
        run: |
          ! grep -r "from.*red_team_runner\|from.*probes\|from.*report_signer\|from.*benchmark_report" guardrail_framework/ || (echo "ERROR: redteam imports found" && exit 1)

      - name: Verify 49 routes in server.py
        run: |
          count=$(grep -c "^@app\." guardrail_framework/server.py)
          echo "Route count: $count"
          [ "$count" -eq 49 ] || (echo "ERROR: expected 49 routes, got $count" && exit 1)
